services:
  ollama:
    image: ollama/ollama:latest
    container_name: studyapp_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ollama-init:
    image: ollama/ollama:latest
    container_name: studyapp_ollama_init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - STUDYAPP_MODEL=${STUDYAPP_MODEL:-mistral-nemo:12b-instruct-q4_K_M}
    entrypoint: >
      sh -c "
        echo '==> Pulling model: '\"$STUDYAPP_MODEL\" &&
        ollama pull \"$STUDYAPP_MODEL\" &&
        echo '==> Model pull complete'
      "
    restart: "no"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: studyapp_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: studyapp_backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./config:/app/config
      - hf_cache:/root/.cache/huggingface
    environment:
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
      - SQLITE_PATH=/data/app.db
      - DATA_DIR=/data
      - HF_HOME=/root/.cache/huggingface
      - DEFAULT_CHAT_MODEL=${STUDYAPP_MODEL:-mistral-nemo:12b-instruct-q4_K_M}
      - DEFAULT_QUIZ_MODEL=${STUDYAPP_MODEL:-mistral-nemo:12b-instruct-q4_K_M}
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: studyapp_frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
  qdrant_data:
  hf_cache:
