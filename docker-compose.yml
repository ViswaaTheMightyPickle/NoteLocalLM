# Base stack: always-present services (vector DB, backend, frontend).
# Ollama lives in docker-compose.ollama.yml so the macOS overlay (which uses a
# native host Ollama) can omit it cleanly. Use ./start.sh to pick the right set.
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: studyapp_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: studyapp_backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./config:/app/config
      - hf_cache:/root/.cache/huggingface
    environment:
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
      - SQLITE_PATH=/data/app.db
      - DATA_DIR=/data
      - HF_HOME=/root/.cache/huggingface
      - DEFAULT_CHAT_MODEL=${STUDYAPP_MODEL:-mistral-nemo:12b-instruct-q4_K_M}
      - DEFAULT_QUIZ_MODEL=${STUDYAPP_MODEL:-mistral-nemo:12b-instruct-q4_K_M}
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: studyapp_frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  qdrant_data:
  hf_cache:
