# Overlay for macOS (Apple Silicon or Intel).
# Ollama runs NATIVELY on the Mac host (Metal GPU acceleration); it is not
# containerised, so this overlay does NOT include docker-compose.ollama.yml.
# The backend reaches the host Ollama via host.docker.internal.
#
# Before first run (handled automatically by ./start.sh):
#   brew install ollama
#   ollama serve
#   ollama pull mistral-nemo:12b-instruct-2407-q4_K_M
#
# Then: docker compose -f docker-compose.yml -f docker-compose.mac.yml up
# Or:   ./start.sh   (auto-detected on macOS)
services:
  backend:
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
