# Overlay adding NVIDIA GPU passthrough to the containerised Ollama.
# Must be layered on top of docker-compose.ollama.yml (which defines `ollama`):
#   docker compose -f docker-compose.yml -f docker-compose.ollama.yml -f docker-compose.nvidia.yml up
# ./start.sh applies this automatically when nvidia-smi is present.
services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
